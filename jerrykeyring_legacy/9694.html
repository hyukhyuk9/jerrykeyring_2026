<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>제리키링 | 내 음원 듣기</title>
  <link rel="icon" type="image/png" href="iphone.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .youtube-link {border: none !important; background: none !important; transition: none !important;}
    .youtube-link:hover {background: none !important; color: inherit !important;}
    .share-link {border: none !important; background: none !important; transition: none !important;}
    .share-link:hover {background: none !important; color: inherit !important;}
  </style>
</head>
<body class="dark-mode">
  <header><img src="iphone.png" alt="로고" class="logo"></header>
  <main>3ㅌ랴
    <audio id="audioPlayer" controls class="mt-4" style="width: 100%; max-width: 300px; padding-bottom: 15px; display: none;"></audio>
    <div class="intro-text"><p>AI 음원 불러오는중..</p></div>
    <video id="introVideo" autoplay muted playsinline style="width: 100%; max-width: 400px; display: block;">
      <source src="/video/video.mp4" type="video/mp4">
    </video>

    <!-- 여기에 변경 -->
    <button class="btn-orange btn-outline-primary track-button" style="display: none;" onclick="playTrack('/music/9694.mp3', '/lyrics/9694.txt')">
      <img src="iphone.png" class="size">
      <p>재즈</p>
    </button>

    <div id="lyrics"></div>
    <div class="action-buttons" style="display: none;">
      <a class="youtube-link" href="https://www.youtube.com/@%EC%A0%9C%EB%A6%AC%ED%82%A4%EB%A7%81AI" target="_blank"><i class="fa-brands fa-youtube"></i></a>
      <button id="shareBtn" class="share-link"><i class="fa-solid fa-share"></i></button>
    </div>
    <p class="mb-0" style="font-size: 7pt; text-align: center; margin-top: 5px; color: #ff914d; font-weight: 500; display: none; opacity: 0;">*DBD LAB. | 나만의 앨범키링</p>
  </main>
  <script>
    const introText = document.querySelector('.intro-text');
    setTimeout(() => introText.classList.add('show'), 500);
    function playTrack(audioSrc, lyricsSrc) {
      const player = document.getElementById('audioPlayer');
      player.src = audioSrc;
      player.style.display = "block";
      setTimeout(() => player.style.opacity = "1", 10);
      player.play();
      const actionButtons = document.querySelector('.action-buttons');
      actionButtons.style.display = "flex";
      setTimeout(() => actionButtons.style.opacity = "1", 10);
      fetch(lyricsSrc)
        .then(response => response.ok ? response.text() : Promise.reject())
        .then(text => {
          const lyrics = document.getElementById('lyrics');
          lyrics.innerText = text;
          lyrics.style.display = 'block';
        })
        .catch(() => {
          const lyrics = document.getElementById('lyrics');
          lyrics.innerText = '가사가 준비되지 않았습니다.';
          lyrics.style.display = 'block';
        });
    }
    document.getElementById('shareBtn').addEventListener('click', async () => {
      const shareData = {
        title: '제리키링 | 내 음원 듣기',
        text: '제리키링에서 만든 나만의 음원을 들어보세요 🎧',
        url: window.location.href
      };
      if (navigator.share) await navigator.share(shareData).catch(()=>{});
      else alert('이 브라우저에서는 공유 기능을 지원하지 않습니다.');
    });
    document.querySelector('.logo').addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
    });
    const introVideo = document.getElementById('introVideo');
    introVideo.addEventListener('ended', () => {
      introText.style.opacity = '0';
      setTimeout(() => introText.style.display = 'none', 1300);
      document.querySelectorAll('.track-button').forEach(btn => {
        btn.style.display = 'block';
        btn.style.opacity = '0';
        setTimeout(() => btn.style.opacity = '1', 10);
      });
      introVideo.style.display = 'none';
      const infoText = document.querySelector('.mb-0');
      infoText.style.display = 'block';
      setTimeout(() => infoText.style.opacity = '1', 10);
    });
  </script>
</body>
</html>
