<body class="container">
  <article class="start">

    <p style="text-align: center; padding-top: 20px;"><img src="cheese.png" alt="로고" style="width: 200px;"></p>
    <button type="button" class="btn btn-orange mt-5" onclick="start();">하러가기</button>
    <button type="button" class="btn btn-orange mt-2" onclick="copyURL()">친구에게 공유하기</button>
  </article>
  <article class="question">
    <div class="progress mt-5">
      <div class="progress-bar" role="progressbar" style="width: calc(100/12*1%)"></div>
    </div> 
    <h6 id="title" class="text-center mt-5"><b>문제</b></h6>
    <input id="type" type="hidden" value="EI">
    <button id="A" type="button" class="btn btn-orange mt-5" style="font-size: 10pt;">Primary</button>
    <button id="B" type="button" class="btn btn-orange mt-3" style="font-size: 10pt;">Primary</button>
  </article>
  <article class="result">
      <div id="capture">
        <img id="img" class="rounded-circle mt-5" src="up_character.png" alt="climber">

      <button type="button" class="btn btn-orange2 mt-5" onclick="goToMusic()">내 유형 음원 듣기</button>
      <button type="button" class="btn btn-orange mt-2" onclick="location.reload();">다시하기</button>
      <button type="button" class="btn btn-orange mt-2" onclick="captureScreenshot()">이미지 저장하기</button>
      <button type="button" class="btn btn-orange mt-2" onclick="copyURL()">친구에게 공유하기</button>
  </article>
  <!--광고 | 카카오 애드핏-->
  <article class="kakao_ad">

      data-ad-height = "50"></ins>

  </article>
  <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    var result = {

    var result_explain = {
      "INTJ": {"explain": "INTJ" },
      "INTP": {"explain": "INTP" },

      "ENTP": {"explain": "ENTP" },

      "INFP": {"explain": "INFP" },

      "ESTJ": {"explain": "ESTJ" },
      "ESFJ": {"explain": "ESFJ" },

      "ESTP": {"explain": "ESTP" },
      "ESFP": {"explain": "ESFP" },
    }

    function start(){
      $(".start").hide();
      $(".question").show();
      $(".restart").hide();
      next();
    }
    $("#A").click(function(){
        var type = $("#type").val();
        var preValue = $("#"+type).val();
        $("#"+type).val(parseInt(preValue)+1);
        next();
    });
    $("#B").click(function(){
      next();
    });
    function next() {
      if (num == 13) {
        $(".question").hide();
        $(".result").show();
        var mbti = "";
        ($("#EI").val() < 2) ? mbti+="I" : mbti+="E";
        ($("#SN").val() < 2) ? mbti+="N" : mbti+="S";
        ($("#TF").val() < 2) ? mbti+="F" : mbti+="T";
        ($("#JP").val() < 2) ? mbti+="P" : mbti+="J";
        // alert(mbti);
        $("#img").attr("src", result[mbti]["img"]);
        $("#cheese").html(result[mbti]["cheese"]);
        $("#genre").html(result[mbti]["genre"]);
        $("#explain").html(result_explain[mbti]["explain"]);
      } else {
        $(".progress-bar").attr('style','width: calc(100/12*'+num+'%)');
        $("#title").html(q[num]["title"]);
        $("#type").val(q[num]["type"]);
        $("#A").html(q[num]["A"]);
        $("#B").html(q[num]["B"]);
        num++;
      }
    }
    function copyURL() {
      // 현재 페이지의 URL 가져오기
      const url = window.location.href;

      // 클립보드에 복사
      navigator.clipboard.writeText(url)
        .then(() => {
          alert('링크가 복사되었습니다.');
        })
        .catch(err => {
          console.error('URL 복사 실패:', err);
        });
    }
    function captureScreenshot() {
      const captureElement = document.getElementById("capture"); // 캡처할 요소 선택
      html2canvas(captureElement).then(canvas => {
        // 캡처 결과를 이미지로 변환
        const imgData = canvas.toDataURL("image/png");

        // 이미지 다운로드 링크 생성
        const link = document.createElement("a");
        link.href = imgData;
        link.download = "pocc.png";
        link.click();
      }).catch(err => {
        console.error("캡처 실패:", err);
      });
      
      // 현재 페이지의 URL 가져오기
      const url = window.location.href;
      navigator.clipboard.writeText(url)
      .then(() => {
          alert('이미지를 저장합니다. 아이폰은 [내 파일]에서 확인 가능합니다.');
          alert('링크가 복사되었습니다. 저장 후 친구에게 공유해보세요!');
        })
        .catch(err => {
          console.error('URL 복사 실패:', err);
        });
    }
    //music.html로 이동
    function goToMusic() {
      window.location.href = "music.html";
    }
