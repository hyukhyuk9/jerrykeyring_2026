<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>제리키링 | 내 음원 듣기</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 1rem;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    .logo {
      height: 40px;
      object-fit: contain;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    footer {
      text-align: center;
      padding: 1rem;
    }

    .track-button {
      width: 100%;
      max-width: 300px;
      margin-bottom: 1rem;
    }

    .size { 
      width: 30px; height: 30px;
    }
    .track-button {
      width: 400px;
      padding: 0.1rem;
      margin: 0.1rem auto;
      font-size: 0.7rem;
      color: #ff914d;
      border: 1px solid #ff914d;
      background-color: transparent;
    }

    .btn-orange {
      color: #ff914d;
      border: 1px solid #ff914d;
      background-color: transparent;
      transition: background-color 0.2s, color 0.2s;
    }

    .btn-orange:hover,
    .btn-orange:active,
    .btn-orange:focus {
      background-color: #ff914d;
      color: white;
      outline: none;
      box-shadow: none;
    }

    #lyrics {
      display: none;
      text-align: center;
      font-size: 0.8rem;
      color: #ff914d;
      margin-top: 10px;
      line-height: 1.4;
      white-space: pre-line;
    }
  </style>
</head>
<body>

  <!-- 상단 로고 -->
  <header>
    <img src="sumbnail.png" alt="로고" class="logo">
  </header>

  <!-- 곡 재생 버튼들 -->
  <main>
    <audio id="audioPlayer" controls class="mt-4" style="width: 100%; max-width: 300px; padding-bottom: 15px;"></audio>
    
    <!-- 버튼 -->
    <button class="btn-orange btn-outline-primary track-button" onclick="playTrack('/music/16.mp3', '/lyrics/016.txt')">
      <img src="sumbnail.png" class="size">
      <p>내 음원 듣기</p>
    </button>

    <!-- 가사 -->
    <div id="lyrics"></div>

    <p class="mb-0" style="font-size: 7pt; text-align: center; margin-top: 5px; color: #ff914d; font-weight: 500;">*POCC | 나만의 앨범키링</p>
  </main>

  <script>
    function playTrack(audioSrc, lyricsSrc) {
      const player = document.getElementById('audioPlayer');
      player.src = audioSrc;
      player.play();

      fetch(lyricsSrc)
        .then(response => {
          if (!response.ok) {
            throw new Error('가사 파일을 불러오지 못했습니다.');
          }
          return response.text();
        })
        .then(text => {
          const lyrics = document.getElementById('lyrics');
          lyrics.innerText = text;
          lyrics.style.display = 'block';
        })
        .catch(error => {
          const lyrics = document.getElementById('lyrics');
          lyrics.innerText = '가사가 준비되지 않았습니다.';
          lyrics.style.display = 'block';
        });
    }

    function toggleLyrics() {
      const lyrics = document.getElementById('lyrics');
      lyrics.style.display = 'block';
    }
  </script>

</body>
</html>
