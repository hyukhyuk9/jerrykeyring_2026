<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제리키링 | 통합 관리자 센터</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff914d;
            --bg-dark: #0a0a0a;
            --bg-card: #111111;
            --border: #222222;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Pretendard Variable", sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

        /* Login Screen */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: var(--bg-card); padding: 3rem; border-radius: 20px;
            border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center;
        }
        .login-box h1 { color: var(--primary); margin-bottom: 2rem; font-size: 1.5rem; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 1rem;
            background: #1a1a1a; border: 1px solid var(--border);
            color: #fff; border-radius: 8px; outline: none;
        }
        .login-box button {
            width: 100%; padding: 12px; background: var(--primary);
            color: #000; border: none; border-radius: 50px;
            font-weight: bold; cursor: pointer; transition: transform 0.2s;
        }

        /* Main Layout */
        #adminContainer { display: none; min-height: 100vh; }
        .sidebar {
            width: 260px; background: var(--bg-card); border-right: 1px solid var(--border);
            padding: 2rem 1.5rem; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100;
        }
        .sidebar-logo { text-align: center; margin-bottom: 3rem; }
        .sidebar-logo div { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 2px; margin-top: 5px; }
        
        .nav-menu { flex: 1; list-style: none; }
        .nav-item {
            padding: 12px 16px; border-radius: 10px; cursor: pointer;
            margin-bottom: 8px; color: var(--text-dim); transition: all 0.2s;
            display: flex; align-items: center; gap: 12px;
        }
        .nav-item i { width: 20px; text-align: center; }
        .nav-item:hover { background: rgba(255,145,77,0.1); color: #fff; }
        .nav-item.active { background: var(--primary); color: #000; font-weight: bold; }

        .content { margin-left: 260px; flex: 1; padding: 2rem 3rem; height: 100vh; overflow-y: auto; }
        .page-header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; }
        .page-title { font-size: 1.8rem; font-weight: 800; display: flex; align-items: center; gap: 1rem; }

        .search-bar { background: #1a1a1a; border: 1px solid var(--border); padding: 8px 16px; border-radius: 20px; color: #fff; font-size: 0.9rem; outline: none; width: 300px; }

        /* Dashboard Table */
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 15px; padding: 1.5rem; margin-bottom: 2rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; color: var(--text-dim); font-size: 0.8rem; padding: 12px; border-bottom: 1px solid var(--border); }
        td { padding: 14px 12px; border-bottom: 1px solid #1a1a1a; font-size: 0.9rem; }
        tr { transition: background 0.2s; }
        tr:hover { background: #1a1a1a; cursor: pointer; }
        
        .tag { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; background: #222; }
        .tag-done { background: var(--primary); color: #000; }
        .tag-pending { background: #333; color: #aaa; cursor: pointer; text-decoration: underline; }
        
        .btn-sm { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: #fff; cursor: pointer; font-size: 0.75rem; transition: background 0.2s; }
        .btn-sm:hover { background: #333; }
        .btn-primary { background: var(--primary); color: #000; border: none; font-weight: bold; }
        .btn-primary:hover { background: #e07b3e; }

        /* Lyrics Timeline Grid */
        .lyrics-grid { display: grid; grid-template-columns: 250px 1fr 350px; gap: 1.5rem; height: calc(100vh - 120px); }
        
        .target-list-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
        .target-search { padding: 10px; border-bottom: 1px solid var(--border); }
        .target-search input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 6px; outline: none; }
        .target-list { flex: 1; overflow-y: auto; }
        .target-item { padding: 12px 10px; border-bottom: 1px solid #1a1a1a; cursor: pointer; font-size: 0.85rem; display: flex; flex-direction: column; gap: 4px; }
        .target-item.active { border-left: 4px solid var(--primary); background: #1a1a1a; }
        
        .editor-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; display: flex; flex-direction: column; }
        .editor-lines { flex: 1; overflow-y: auto; margin-top: 1rem; }
        
        /* Time Picker Style (Scroll Style Selects) */
        .lyric-line-edit { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; background: #1a1a1a; padding: 12px; border-radius: 10px; border: 1px solid transparent; transition: border 0.2s; }
        .lyric-line-edit:focus-within { border-color: var(--primary); }
        
        .time-picker { display: flex; align-items: center; gap: 5px; background: #000; padding: 5px 10px; border-radius: 8px; border: 1px solid #333; }
        .time-picker select { background: transparent; color: var(--primary); border: none; font-family: monospace; font-size: 1rem; outline: none; cursor: pointer; -webkit-appearance: none; text-align: center; width: 40px; }
        .time-picker span { color: #666; font-size: 0.8rem; }

        .lyric-label { width: 80px; font-weight: bold; color: var(--primary); font-size: 0.85rem; }
        .lyric-text-static { flex: 1; color: #fff; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Preview & Custom Player */
        .preview-box { background: #000; border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .preview-content { flex: 1; overflow-y: auto; padding: 2rem 1rem 120px 1rem; text-align: center; }
        .preview-line { font-size: 1rem; color: rgba(255,255,255,0.3); margin-bottom: 20px; transition: color 0.3s; }
        .preview-line.highlight { color: var(--primary); font-weight: bold; }
        
        /* Custom Audio Player */
        .custom-player { position: absolute; bottom: 0; left: 0; width: 100%; background: #111; padding: 20px; border-top: 1px solid var(--border); }
        .player-top { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .play-btn { background: var(--primary); color: #000; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .progress-container { flex: 1; height: 6px; background: #333; border-radius: 3px; position: relative; cursor: pointer; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; border-radius: 3px; }
        .time-info { font-size: 0.75rem; color: #888; font-family: monospace; min-width: 80px; }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #000; padding: 10px 30px; border-radius: 50px; font-weight: bold; display: none; z-index: 2000; }
        
        .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 10; color: var(--primary); }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1500; }
        .modal-body { background: var(--bg-card); padding: 2rem; border-radius: 15px; width: 500px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid var(--border); color: #fff; border-radius: 6px; }

    </style>
</head>
<body onclick="handleGlobalClick(event)">

    <div id="toast">알림</div>

    <!-- Login -->
    <div id="loginOverlay">
        <div class="login-box">
            <h1>JERRY KEYRING<br><span style="font-size: 0.8rem; color: #888;">ADMIN LOGIN</span></h1>
            <input type="text" id="adminId" placeholder="아이디" onkeydown="if(event.key==='Enter') handleLogin()">
            <input type="password" id="adminPw" placeholder="비밀번호" onkeydown="if(event.key==='Enter') handleLogin()">
            <button onclick="handleLogin()">로그인</button>
        </div>
    </div>

    <!-- Main Container -->
    <div id="adminContainer">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="iphone.png" style="width: 50px;">
                <div>ADMIN CENTER</div>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active" onclick="showTab('dashboard', this)"><i class="fa-solid fa-table-list"></i> 대시보드</li>
                <li class="nav-item" onclick="showTab('lyrics', this)"><i class="fa-solid fa-clock-rotate-left"></i> 가사 타임라인</li>
                <li class="nav-item" onclick="showTab('upload', this)"><i class="fa-solid fa-cloud-arrow-up"></i> 음원 등록</li>
                <li class="nav-item" onclick="showTab('api', this)"><i class="fa-solid fa-code"></i> API 연동</li>
            </ul>
            <button class="btn-sm" style="color: #ff4d4d; margin-top: auto;" onclick="handleLogout()">로그아웃</button>
        </aside>

        <main class="content">
            <!-- Dashboard -->
            <section id="tab-dashboard" class="tab-content">
                <div class="page-header">
                    <div class="page-title">
                        사용자 데이터 관리
                        <input type="text" id="searchInput" class="search-bar" placeholder="이름, NFC ID 검색..." oninput="filterTable()">
                    </div>
                    <button class="btn-sm btn-primary" onclick="openModal('add')"><i class="fa-solid fa-plus"></i> 신규 등록</button>
                </div>
                <div class="card">
                    <table id="trackTable">
                        <thead>
                            <tr>
                                <th>NFC ID</th>
                                <th>사용자 이름</th>
                                <th>장르</th>
                                <th>음원</th>
                                <th>타임라인</th>
                                <th>동작</th>
                            </tr>
                        </thead>
                        <tbody id="trackBody"></tbody>
                    </table>
                </div>
            </section>

            <!-- Lyrics Timeline -->
            <section id="tab-lyrics" class="tab-content" style="display: none;">
                <div class="page-header">
                    <h2 class="page-title">
                        가사 타임라인 설정
                        <button class="play-btn" style="width: 30px; height: 30px; font-size: 0.8rem;" onclick="togglePlay()"><i class="fa-solid fa-play" id="titlePlayIcon"></i></button>
                    </h2>
                    <div>
                        <span id="autoSaveMsg" style="color: var(--primary); font-size: 0.8rem; margin-right: 15px; display: none;"><i class="fa-solid fa-circle-check"></i> 임시저장</span>
                        <button class="btn-sm btn-primary" style="padding: 10px 15px;" onclick="saveLyricsToDB()"><i class="fa-solid fa-floppy-disk"></i></button>
                    </div>
                </div>
                <div class="lyrics-grid">
                    <!-- Left: Search & List -->
                    <div class="target-list-box">
                        <div class="target-search">
                            <input type="text" id="lyricSearchInput" placeholder="NFC / 이름 검색..." oninput="filterLyricTargets()">
                        </div>
                        <div class="target-list" id="lyricTargetList"></div>
                    </div>
                    
                    <!-- Center: Editor -->
                    <div class="editor-box" style="position: relative;">
                        <div id="editorLoading" class="loading-overlay"><i class="fa-solid fa-spinner fa-spin"></i> 음원 분석 중...</div>
                        <div style="font-weight: bold; color: var(--primary); font-size: 0.9rem;" id="editorCurrentTarget">사용자를 선택하세요</div>
                        <div class="editor-lines" id="editorLinesContainer"></div>
                    </div>
                    
                    <!-- Right: Preview & Custom Player -->
                    <div class="preview-box">
                        <div class="preview-content" id="lyricPreviewArea"></div>
                        
                        <div class="custom-player">
                            <div class="player-top">
                                <button class="play-btn" onclick="togglePlay()"><i class="fa-solid fa-play" id="mainPlayIcon"></i></button>
                                <div class="progress-container" onclick="seek(event)">
                                    <div class="progress-bar" id="progressBar"></div>
                                </div>
                                <div class="time-info" id="timeInfo">00:00 / 00:00</div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Detail/Edit Modal -->
    <div class="modal" id="trackModal">
        <div class="modal-body" style="position:relative;">
            <button class="btn-sm" style="position:absolute; top: 1rem; right: 1rem;" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            <h3 id="modalTitle" style="margin-bottom: 1.5rem;">데이터 수정</h3>
            <input type="hidden" id="editId">
            <div class="form-group" style="background: #222; padding: 10px; border-radius: 8px;">
                <label style="color: var(--primary);"><i class="fa-solid fa-music"></i> 음원 첨부</label>
                <input type="file" id="fieldNewAudio" accept="audio/*">
            </div>
            <div class="form-group"><label>NFC ID</label><input type="text" id="fieldNfcId"></div>
            <div class="form-group"><label>사용자 이름</label><input type="text" id="fieldName"></div>
            <div class="form-group"><label>전화번호</label><input type="text" id="fieldPhone"></div>
            <div class="form-group"><label>장르</label><input type="text" id="fieldGenre"></div>
            <div style="display: flex; gap: 10px; margin-top: 2rem;">
                <button class="btn-sm btn-primary" style="flex: 1;" onclick="saveTrack()">저장하기</button>
                <button class="btn-sm" style="flex: 1;" onclick="closeModal()">취소</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/api.js"></script>
    <script>
        let allTracks = [];
        let currentTargetId = null;
        let timelineData = [];
        let autoSaveTimer = null;
        const audio = new Audio();

        window.onload = () => {
            if(localStorage.getItem('adminAuth') === 'true') {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('adminContainer').style.display = 'flex';
                loadData();
            }
        };

        function handleLogin() {
            const id = document.getElementById('adminId').value;
            const pw = document.getElementById('adminPw').value;
            if (id === 'jerry' && pw === 'tom') {
                localStorage.setItem('adminAuth', 'true');
                location.reload();
            }
        }
        function handleLogout() { localStorage.removeItem('adminAuth'); location.reload(); }

        async function loadData() {
            allTracks = await window.api.getAllTracks();
            renderTable();
            renderLyricTargets();
        }

        function renderTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('trackBody');
            tbody.innerHTML = '';
            allTracks.filter(t => t.nfc_id.toLowerCase().includes(query) || t.user_name.toLowerCase().includes(query)).forEach(t => {
                const tr = document.createElement('tr');
                tr.onclick = (e) => { if(e.target.tagName !== 'BUTTON') openModal('edit', t.id); };
                // modify 컬럼은 이제 보조용으로만 사용 (또는 체크용)
                const isDone = (t.modify && t.modify.includes('분')); 
                tr.innerHTML = `
                    <td>${t.nfc_id}</td>
                    <td>${t.user_name}</td>
                    <td>${t.genre || '-'}</td>
                    <td>${(t.audio_files && t.audio_files.length > 0) ? 'O' : '-'}</td>
                    <td><span class="tag ${isDone ? 'tag-done' : 'tag-pending'}" onclick="event.stopPropagation(); goToLyrics('${t.id}')">${isDone ? '완료' : '미등록'}</span></td>
                    <td><button class="btn-sm" style="color:#ff4d4d;" onclick="event.stopPropagation(); handleDelete('${t.id}')">삭제</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function goToLyrics(id) {
            showTab('lyrics', document.querySelectorAll('.nav-item')[1]);
            selectLyricTarget(id);
        }

        function showTab(tab, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById('tab-' + tab).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function filterLyricTargets() {
            const query = document.getElementById('lyricSearchInput').value.toLowerCase();
            const list = document.getElementById('lyricTargetList');
            list.innerHTML = '';
            allTracks.filter(t => t.nfc_id.toLowerCase().includes(query) || t.user_name.toLowerCase().includes(query)).forEach(t => {
                const div = document.createElement('div');
                div.className = `target-item ${currentTargetId === t.id ? 'active' : ''}`;
                div.innerHTML = `<strong>${t.nfc_id}</strong><span>${t.user_name}</span>`;
                div.onclick = () => selectLyricTarget(t.id);
                list.appendChild(div);
            });
        }

        async function selectLyricTarget(id) {
            currentTargetId = id;
            const t = allTracks.find(x => x.id == id);
            document.getElementById('editorCurrentTarget').innerText = `[${t.nfc_id}] ${t.user_name}`;
            filterLyricTargets();

            const loading = document.getElementById('editorLoading');
            loading.style.display = 'flex';

            const initTimeline = async (duration) => {
                timelineData = await window.api.getOrInitTimeline(id, duration);
                renderEditor();
                loading.style.display = 'none';
            };

            // 음원 로드 후 길이를 파악하여 초기화
            if(t.audio_files && t.audio_files.length > 0) {
                audio.src = t.audio_files[0].audio_url;
                audio.onloadedmetadata = () => {
                    initTimeline(audio.duration);
                };
            } else {
                audio.src = '';
                initTimeline(0);
            }
        }

        function renderEditor() {
            const container = document.getElementById('editorLinesContainer');
            container.innerHTML = '';
            timelineData.forEach((item, idx) => {
                // start_time: "00분 00초"
                const match = item.start_time.match(/(\d{2})분 (\d{2})초/);
                const min = match ? match[1] : "00";
                const sec = match ? match[2] : "00";

                const div = document.createElement('div');
                div.className = 'lyric-line-edit';
                div.innerHTML = `
                    <div class="lyric-label">${item.section_name}</div>
                    <div class="time-picker">
                        <select onchange="updateTime(${idx}, 'min', this.value)">${renderOptions(0, 10, min)}</select>
                        <span>분</span>
                        <select onchange="updateTime(${idx}, 'sec', this.value)">${renderOptions(0, 59, sec)}</select>
                        <span>초</span>
                    </div>
                    <div class="lyric-text-static">구간 시작 지점 설정</div>
                `;
                container.appendChild(div);
            });
            renderPreview();
        }

        function renderOptions(start, end, current) {
            let html = '';
            for(let i=start; i<=end; i++) {
                const val = String(i).padStart(2, '0');
                html += `<option value="${val}" ${val === current ? 'selected' : ''}>${val}</option>`;
            }
            return html;
        }

        function updateTime(idx, part, val) {
            const match = timelineData[idx].start_time.match(/(\d{2})분 (\d{2})초/);
            let min = match[1];
            let sec = match[2];
            if(part === 'min') min = val;
            if(part === 'sec') sec = val;
            timelineData[idx].start_time = `${min}분 ${sec}초`;
            startAutoSaveTimer();
            renderPreview();
        }

        function startAutoSaveTimer() {
            if(autoSaveTimer) clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => { performAutoSave(); }, 2000);
        }

        function handleGlobalClick(e) {
            if(!e.target.closest('.lyric-line-edit') && !e.target.closest('.btn-primary') && !e.target.closest('.target-item')) {
                if(autoSaveTimer) { clearTimeout(autoSaveTimer); performAutoSave(); }
            }
        }

        async function performAutoSave() {
            if(!currentTargetId) return;
            // 타임라인 테이블 업데이트 (임시저장도 DB에 바로 반영)
            await window.api.updateTimeline(timelineData);
            const msg = document.getElementById('autoSaveMsg');
            msg.style.display = 'inline';
            setTimeout(() => msg.style.display = 'none', 1500);
        }

        async function saveLyricsToDB() {
            if(!currentTargetId) return;
            // 최종 저장 시 tracks 테이블의 modify에 요약본 기록 (미등록 -> 완료 체크용)
            const summary = timelineData.map(d => `[${d.start_time}] ${d.section_name}`).join('\n');
            await window.api.updateTimeline(timelineData);
            const res = await window.api.updateTrack(currentTargetId, { modify: summary });
            if(res.success) {
                toast('최종 저장이 완료되었습니다! (상태: 완료)');
                loadData();
            }
        }

        function renderPreview() {
            const preview = document.getElementById('lyricPreviewArea');
            preview.innerHTML = '';
            timelineData.forEach((item, idx) => {
                preview.innerHTML += `<div class="preview-line" id="prev_${idx}">${item.start_time} - ${item.section_name}</div>`;
            });
        }

        // Custom Player Logic
        function togglePlay() {
            if(audio.paused) { 
                audio.play().catch(() => {}); 
                document.getElementById('mainPlayIcon').className = 'fa-solid fa-pause'; 
                document.getElementById('titlePlayIcon').className = 'fa-solid fa-pause'; 
            } else { 
                audio.pause(); 
                document.getElementById('mainPlayIcon').className = 'fa-solid fa-play'; 
                document.getElementById('titlePlayIcon').className = 'fa-solid fa-play'; 
            }
        }

        audio.ontimeupdate = () => {
            const p = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressBar').style.width = p + '%';
            document.getElementById('timeInfo').innerText = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
            
            let activeIdx = -1;
            const cTime = audio.currentTime;
            timelineData.forEach((d, idx) => {
                const match = d.start_time.match(/(\d{2})분 (\d{2})초/);
                const total = parseInt(match[1])*60 + parseInt(match[2]);
                if(cTime >= total) activeIdx = idx;
            });
            document.querySelectorAll('.preview-line').forEach((el, idx) => {
                if(idx === activeIdx) el.classList.add('highlight');
                else el.classList.remove('highlight');
            });
        };

        function formatTime(s) {
            if(isNaN(s)) return "00:00";
            const m = Math.floor(s/60);
            const ss = Math.floor(s%60);
            return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
        }

        function seek(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            const p = (e.clientX - rect.left) / rect.width;
            audio.currentTime = p * audio.duration;
        }

        function toast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display='none', 2000); }
        function openModal(m, id) { document.getElementById('trackModal').style.display='flex'; if(id) { const t = allTracks.find(x=>x.id==id); document.getElementById('editId').value=t.id; document.getElementById('fieldNfcId').value=t.nfc_id; document.getElementById('fieldName').value=t.user_name; document.getElementById('fieldPhone').value=t.phone_number; document.getElementById('fieldGenre').value=t.genre; } }
        function closeModal() { document.getElementById('trackModal').style.display='none'; }
        async function saveTrack() {
            const id = document.getElementById('editId').value;
            const data = { nfc_id: document.getElementById('fieldNfcId').value, user_name: document.getElementById('fieldName').value, phone_number: document.getElementById('fieldPhone').value, genre: document.getElementById('fieldGenre').value };
            let res = id ? await window.api.updateTrack(id, data) : await window.api.insertTrack(data);
            const file = document.getElementById('fieldNewAudio').files[0];
            if(res.success && file) await window.api.uploadAudio(file, data.nfc_id);
            if(res.success) { toast('저장완료'); closeModal(); loadData(); }
        }
        async function handleDelete(id) {
            if(confirm('정말 삭제하시겠습니까?')) {
                const res = await window.api.deleteTrack(id);
                if(res.success) { toast('삭제완료'); loadData(); }
            }
        }
    </script>
</body>
</html>
