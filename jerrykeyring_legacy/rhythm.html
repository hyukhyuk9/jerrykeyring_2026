<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>제리 리듬 | Jerry Rhythm</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff914d;
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --text: #ffffff;
            --accent: #ffeb3b; /* 노란색 (성공 이펙트용) */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Pretendard Variable", sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            z-index: 10;
        }

        /* 가사 표시 영역 */
        .lyrics-display {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            z-index: 5;
        }
        .lyrics-display.active {
            color: var(--primary);
            transform: translateX(-50%) scale(1.05);
        }

        .score-container {
            text-align: left;
        }

        .score-label {
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 2rem;
            font-weight: 900;
            font-family: 'Courier New', monospace;
        }

        .combo-container {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            transition: opacity 0.1s;
        }

        .combo-value {
            font-size: 4rem;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(255, 235, 59, 0.5);
        }

        .combo-label {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 4px;
        }

        .judgment-text {
            position: absolute;
            top: 58%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            opacity: 0;
        }

        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25vh;
            display: flex;
            pointer-events: auto;
        }

        .lane-btn {
            flex: 1;
            border-top: 2px solid rgba(255, 145, 77, 0.1);
            background: linear-gradient(to bottom, rgba(255, 145, 77, 0.05), transparent);
            transition: background 0.1s;
            position: relative;
        }

        .lane-btn:active, .lane-btn.active {
            background: linear-gradient(to bottom, rgba(255, 145, 77, 0.3), rgba(255, 145, 77, 0.1));
        }

        .lane-btn::after {
            content: '';
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 145, 77, 0.3);
            border-radius: 50%;
        }

        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo {
            width: 100px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--primary));
        }

        .title {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
        }

        .play-btn {
            padding: 15px 60px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 20px rgba(255, 145, 77, 0.4);
        }

        .play-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            color: white;
            cursor: pointer;
            z-index: 101;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="startScreen" class="start-screen">
        <div class="close-btn" onclick="window.parent.postMessage('closeGame', '*')"><i class="fa-solid fa-xmark"></i></div>
        <img src="sumbnail.png" alt="Logo" class="logo">
        <h1 class="title">JERRY RHYTHM</h1>
        <p class="subtitle">리듬에 맞춰 치즈를 탭하세요!</p>
        <button class="play-btn" onclick="startGame()">START GAME</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-overlay">
        <div class="top-bar">
            <div class="score-container">
                <div class="score-label">Score</div>
                <div id="scoreValue" class="score-value">000000</div>
            </div>
            <div id="healthBar" style="width: 100px; height: 10px; background: #333; border-radius: 5px; overflow: hidden;">
                <div id="healthFill" style="width: 100%; height: 100%; background: var(--primary); transition: width 0.3s;"></div>
            </div>
        </div>

        <!-- 가사 영역 -->
        <div id="lyricsDisplay" class="lyrics-display">준비중...</div>

        <div id="comboGroup" class="combo-container">
            <div id="comboValue" class="combo-value">0</div>
            <div class="combo-label">COMBO</div>
        </div>

        <div id="judgmentText" class="judgment-text">PERFECT</div>
    </div>

    <div class="controls">
        <div class="lane-btn" id="lane0" onmousedown="handleInput(0)" ontouchstart="handleInput(0)"></div>
        <div class="lane-btn" id="lane1" onmousedown="handleInput(1)" ontouchstart="handleInput(1)"></div>
        <div class="lane-btn" id="lane2" onmousedown="handleInput(2)" ontouchstart="handleInput(2)"></div>
        <div class="lane-btn" id="lane3" onmousedown="handleInput(3)" ontouchstart="handleInput(3)"></div>
    </div>

    <audio id="gameMusic" src=""></audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreValue');
        const comboEl = document.getElementById('comboValue');
        const comboGroup = document.getElementById('comboGroup');
        const judgmentEl = document.getElementById('judgmentText');
        const lyricsEl = document.getElementById('lyricsDisplay');
        const music = document.getElementById('gameMusic');
        const healthFill = document.getElementById('healthFill');

        // URL 파라미터에서 음원 경로 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const musicSrc = urlParams.get('src');
        music.src = musicSrc || '1%20Indie%20Pop.mp3';

        let score = 0;
        let combo = 0;
        let health = 100;
        let gameActive = false;
        let noteInterval;
        let lyricsData = [];
        let particles = [];
        
        const lanes = 4;
        const notes = [];
        const cheeseImg = new Image();
        cheeseImg.src = 'cheese.png';

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 5 + 2;
                this.speedX = (Math.random() - 0.5) * 10;
                this.speedY = (Math.random() - 0.5) * 10;
                this.alpha = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= 0.02;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Note {
            constructor(lane, time) {
                this.lane = lane;
                this.time = time;
                this.y = -100;
                this.hit = false;
                this.missed = false;
            }

            update(currentTime, speed) {
                const timeDiff = this.time - currentTime;
                const hitLineY = canvas.height * 0.75;
                this.y = hitLineY - (timeDiff * speed);
                
                if (!this.hit && !this.missed && this.y > hitLineY + 100) {
                    this.missed = true;
                    handleMiss();
                }
            }

            draw() {
                if (this.hit || this.missed) return;
                const laneWidth = canvas.width / lanes;
                const x = this.lane * laneWidth + laneWidth / 2;
                
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(255, 145, 77, 0.6)';
                ctx.drawImage(cheeseImg, x - 35, this.y - 35, 70, 70);
                ctx.restore();
            }
        }

        // 음원 로딩 체크
        const startBtn = document.querySelector('.play-btn');
        if (music.readyState < 2) {
            startBtn.innerText = 'LOADING...';
            startBtn.disabled = true;
            music.oncanplaythrough = () => {
                startBtn.innerText = 'START GAME';
                startBtn.disabled = false;
            };
        }

        function startGame() {
            if (gameActive) return;
            if (music.readyState < 2) {
                alert("음원을 불러오는 중입니다. 잠시만 기다려주세요!");
                return;
            }
            document.getElementById('startScreen').style.display = 'none';
            gameActive = true;
            score = 0;
            combo = 0;
            health = 100;
            notes.length = 0;
            particles.length = 0;
            music.currentTime = 0;
            music.play();
            requestAnimationFrame(gameLoop);
            
            if (noteInterval) clearInterval(noteInterval);
            noteInterval = setInterval(() => {
                if (!gameActive) return;
                const lane = Math.floor(Math.random() * lanes);
                const hitTime = music.currentTime * 1000 + 2000;
                notes.push(new Note(lane, hitTime));
            }, 550);
        }

        function gameLoop(time) {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw lanes
            const laneWidth = canvas.width / lanes;
            ctx.strokeStyle = 'rgba(255, 145, 77, 0.1)';
            for (let i = 1; i < lanes; i++) {
                ctx.beginPath();
                ctx.moveTo(i * laneWidth, 0);
                ctx.lineTo(i * laneWidth, canvas.height);
                ctx.stroke();
            }

            // Draw hit line
            const hitLineY = canvas.height * 0.75;
            ctx.strokeStyle = 'rgba(255, 145, 77, 0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, hitLineY);
            ctx.lineTo(canvas.width, hitLineY);
            ctx.stroke();

            const currentTime = music.currentTime * 1000;
            const speed = 0.5;

            // Update & Draw notes
            for (let i = notes.length - 1; i >= 0; i--) {
                notes[i].update(currentTime, speed);
                notes[i].draw();
                if (notes[i].y > canvas.height) notes.splice(i, 1);
            }

            // Update & Draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }

            // Update Lyrics
            updateLyrics(music.currentTime);

            requestAnimationFrame(gameLoop);
        }

        function updateLyrics(time) {
            if (!lyricsData || lyricsData.length === 0) return;
            const currentLine = lyricsData.find((l, i) => {
                const next = lyricsData[i + 1];
                return time >= l.time && (!next || time < next.time);
            });
            if (currentLine && lyricsEl.innerText !== currentLine.text) {
                lyricsEl.innerText = currentLine.text;
                lyricsEl.classList.add('active');
                setTimeout(() => lyricsEl.classList.remove('active'), 500);
            }
        }

        function handleInput(lane) {
            if (!gameActive) return;
            const currentTime = music.currentTime * 1000;
            const threshold = 150;

            let found = false;
            for (let note of notes) {
                if (note.lane === lane && !note.hit && !note.missed) {
                    const diff = Math.abs(note.time - currentTime);
                    if (diff < threshold) {
                        note.hit = true;
                        createHitEffect(lane);
                        handleHit(diff);
                        found = true;
                        break;
                    }
                }
            }

            const btn = document.getElementById('lane' + lane);
            btn.classList.add('active');
            setTimeout(() => btn.classList.remove('active'), 100);
        }

        function createHitEffect(lane) {
            const laneWidth = canvas.width / lanes;
            const x = lane * laneWidth + laneWidth / 2;
            const y = canvas.height * 0.75;
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, '#ffeb3b')); // 노란색 성공 이펙트
            }
        }

        function handleHit(diff) {
            combo++;
            let points = 100;
            let text = "PERFECT";
            let color = "#ffeb3b";

            if (diff > 70) {
                points = 50;
                text = "GREAT";
                color = "#ff914d";
            }

            score += points * (1 + Math.floor(combo / 10) * 0.1);
            updateUI(text, color);
        }

        function handleMiss() {
            combo = 0;
            health -= 5;
            if (health <= 0) gameOver();
            updateUI("MISS", "#ff3d00");
        }

        function updateUI(text, color) {
            scoreEl.innerText = Math.floor(score).toString().padStart(6, '0');
            if (combo > 1) {
                comboEl.innerText = combo;
                comboGroup.style.opacity = 1;
            } else {
                comboGroup.style.opacity = 0;
            }
            judgmentEl.innerText = text;
            judgmentEl.style.color = color;
            judgmentEl.style.opacity = 1;
            judgmentEl.style.transform = 'translate(-50%, -50%) scale(1.2)';
            setTimeout(() => {
                judgmentEl.style.opacity = 0;
                judgmentEl.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 300);
            healthFill.style.width = health + '%';
        }

        function gameOver() {
            gameActive = false;
            music.pause();
            alert("Game Over! Score: " + Math.floor(score));
            location.reload();
        }

        // 가사 데이터 수신
        window.addEventListener('message', (e) => {
            if (e.data.type === 'setLyrics') {
                lyricsData = e.data.lyrics;
                lyricsEl.innerText = "READY";
            }
        });

        window.addEventListener('keydown', (e) => {
            const keys = { 's': 0, 'd': 1, 'j': 2, 'k': 3 };
            if (keys[e.key.toLowerCase()] !== undefined) handleInput(keys[e.key.toLowerCase()]);
        });
    </script>
</body>
</html>
